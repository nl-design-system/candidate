name: Chromatic

on:
  workflow_call:
    secrets:
      CHROMATIC_PROJECT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Make sure that history is available to Chromatic
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm package manager
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js version and cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Check for known security issues with npm packages
        run: |
          echo "Auditing npm dependencies before installing them. For more information, see: https://nldesignsystem.nl/pnpm-audit"
          pnpm audit --audit-level critical

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download visual-regression-testing artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: visual-regression-testing
          path: packages/storybook-test/dist/

      - name: Chromatic
        uses: chromaui/action@98132da0fca2211fb41b3af7b49ce85176007851 # v17.8.0
        with:
          autoAcceptChanges: main
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBaseDir: packages/storybook-test/
          storybookBuildDir: packages/storybook-test/dist/
          storybookConfigDir: packages/storybook-test/config/
          exitOnceUploaded: true
          onlyChanged: true
          externals: |
            package.json
            **/package.json
